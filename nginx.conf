server {
    listen 80;
    server_name cerurb-vue.foxinline.com;

    # Redirecionar HTTP para HTTPS (Recomendado se tiver SSL)
    # return 301 https://$host$request_uri;

    # Módulo de Estado (Frontend Vue)
    location /estado/ {
        proxy_pass http://vue-estado-module:4191/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # API de Estado (Backend Quarkus)
    location /api/estado/ {
        proxy_pass http://api-estado:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Repita o padrão para os outros módulos (Situação Ocupante, Jurídica, etc)
    location /situacao-ocupante/ {
        proxy_pass http://vue-situacao-ocupante-module:4173/;
    }

    location /api/situacao-ocupante/ {
        proxy_pass http://api-situacao-ocupante:8081/;
    }
}
