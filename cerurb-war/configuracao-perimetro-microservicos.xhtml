<?xml version="1.0" encoding="UTF-8"?>

  Fragmento para incluir na tela de Configuração do Cerurb (WAR).

  Inclua este conteúdo dentro da tab "perimetro" (id="perimetro"), após o card de Estado.

  No projeto WAR, crie as páginas .xhtml que fazem o redirect ou iframe para o Vue:
  - pesquisarEstadoVue.xhtml, estadoVue.xhtml (já existem)
  - pesquisarTipoComodoVue.xhtml, tipoComodoVue.xhtml
  - pesquisarTipoOrgaoVue.xhtml, tipoOrgaoVue.xhtml
  - pesquisarOrgaoVue.xhtml, orgaoVue.xhtml
  - pesquisarInteressadoVue.xhtml, interessadoVue.xhtml

-->

            </div>

                        Pesquisar

                    <a class="list-group-item list-group-item-action" href="estadoVue.xhtml">
