# Deploy automático do microserviço Atualização (CI/CD).
# Requer secrets: HOST, USERNAME, SSH_KEY (ver DEPLOY-ESTADO-CI-CD.md).
name: Deploy Microserviço Estado

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            echo "Conectado no servidor"
            cd ~/meu-projeto-test

            echo "Atualizando código"
            git pull origin main

            echo "Rebuild containers"
            sudo docker compose up -d --build vue-estado-module api-estado

            echo "Containers rodando:"
            sudo docker ps