# Deploy Cerurb Vue: build automático em push na main/master (estilo Netlify).
# Para publicar no servidor, adicione um job de deploy (rsync, Netlify CLI, etc.) e configure os secrets.
#
# Se layout/ e *-module/ estiverem numa subpasta (ex.: meu-projeto-test/), defina:
#   env: ROOT_DIR: meu-projeto-test
# e use working-directory: ${{ env.ROOT_DIR }} nos steps.

name: Build Cerurb Vue

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Se layout/ e *-module/ estiverem numa subpasta, defina working-directory (ex.: meu-projeto-test)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Prepare .env for layout
        run: |
          if [ -f layout/.env.example ] && [ ! -f layout/.env ]; then
            cp layout/.env.example layout/.env
          fi

      - name: Build all (remotes + layout)
        run: |
          chmod +x scripts/build-all.sh
          ./scripts/build-all.sh

      - name: Upload layout dist
        uses: actions/upload-artifact@v4
        with:
          name: layout-dist
          path: layout/dist

      - name: Upload estado-module dist
        uses: actions/upload-artifact@v4
        with:
          name: estado-module-dist
          path: estado-module/frontend/dist

      # Descomente e repita para outros módulos se quiser baixar os artefatos depois.
      # - name: Upload tipo-comodo-module dist
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: tipo-comodo-module-dist
      #     path: tipo-comodo-module/frontend/dist

