# Deploy automático do microserviço Atualização (CI/CD).
# Requer secrets: HOST, USERNAME, SSH_KEY (ver DEPLOY-ESTADO-CI-CD.md).

name: Deploy Microserviço Atualização

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos no servidor via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m # Aumente o tempo para builds pesados
          script: |
            cd ~/meu-projeto-test
            git pull origin main
            docker compose down
            docker compose up -d --build
