# =========================================================================
# CONFIGURAÇÕES BÁSICAS E DE REDE
# =========================================================================

# Porta que o microsserviço Quarkus escutará. Confirme que esta porta está
# mapeada corretamente no seu docker-compose.yaml.
quarkus.http.port=8087 


# CONFIGURAÇÃO DE LOGGING: Necessário para ver suas mensagens System.out.println e logs de INFO/JWT
# Define o nível mínimo de log para INFO, garantindo que o logger do filtro e do resource apareçam.
quarkus.log.level=INFO
# Opcional: Para ver detalhes de debug do seu pacote
quarkus.log.category."br.com.foxinline".level=DEBUG


# =========================================================================
# CONFIGURAÇÕES DE BANCO DE DADOS (PostgreSQL Reativo)
# =========================================================================

quarkus.datasource.db-kind=postgresql
# ATENÇÃO: Se estiver usando Docker Compose, "localhost" deve ser substituído
# pelo nome do serviço do seu container PostgreSQL (ex: "some-postgres").
quarkus.datasource.reactive.url=postgresql://localhost:5432/cerurbpro 
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres


# =========================================================================
# CONFIGURAÇÕES DO HIBERNATE/PANACHE
# =========================================================================

quarkus.hibernate-orm.database.generation=none
# Mantemos os logs de SQL desabilitados para não poluir o console com o log do JWT
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=false
quarkus.hibernate-orm.packages=br.com.foxinline.domain.model

# Desativa todos os DevServices que tentam subir containers
quarkus.devservices.enabled=false


# =========================================================================
# CONFIGURAÇÕES DE AUDITORIA (REST Client)
# =========================================================================

auditoria-api/mp-rest/url=http://localhost:9191
auditoria-api/mp-rest/scope=javax.inject.Singleton
auditoria-api/mp-rest/connectTimeout=5000
auditoria-api/mp-rest/readTimeout=10000


# =========================================================================
# CONFIGURAÇÃO CORS (Para comunicação iFrame/Vue.js)
# =========================================================================

quarkus.http.cors=true
# Incluímos a porta 4185 que você usa no seu frontend Vue.js
# Se o seu JSF principal roda em outra porta, inclua-a também aqui (ex: 8080)
quarkus.http.cors.origins=http://localhost:5173,http://localhost:4175,http://172.18.0.4:4185
# O cabeçalho 'Authorization' é CRUCIAL para o JWT!
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with, Content-Disposition 
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS
