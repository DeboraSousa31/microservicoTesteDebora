server {
    listen 80;
    server_name cerurb-vue.foxinline.com;

    # Módulos Frontend (Vue)
    location /estado/ {
        proxy_pass http://vue-estado-module:4191/;
    }

    location /situacao-ocupante/ {
        proxy_pass http://vue-situacao-ocupante-module:4173/;
    }

    location /situacao-juridica/ {
        proxy_pass http://vue-situacao-juridica-module:4175/;
    }

    location /orgao-empresa/ {
        proxy_pass http://vue-orgao-empresa-module:4177/;
    }

    # APIs (Quarkus)
    location /api/estado/ {
        proxy_pass http://api-estado:8090/;
    }

    location /api/situacao-ocupante/ {
        proxy_pass http://api-situacao-ocupante:8081/;
    }

    location /api/situacao-juridica/ {
        proxy_pass http://api-situacao-juridica:8082/;
    }

    # Configurações padrão para Proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
